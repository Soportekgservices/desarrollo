<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sistema Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <section id="loginView" class="view-section active login-screen">
        <div class="navbar-login">
            <div class="logo-login">EDUEFICIENTE</div>
            <div class="menu-login">
                <a href="#">Inicio</a>
                <a href="#">Nosotros</a>
                <a href="#">Servicios</a>
                <a href="#" class="ingresa-btn">Ingresa</a>
            </div>
        </div>
        <div class="wrapper-login">
            <div class="card-login">
                <div class="left-login">
                    <div class="image-placeholder-login">
                        <img src="https://img.freepik.com/vector-premium/ilustracion-concepto-seguridad-datos-globales_86047-620.jpg?w=700" alt="Ilustración">
                    </div>
                </div>
                <div class="right-login">
                    <div class="login-box-container">
                        <h2>BIENVENIDO</h2>
                        <p>Portal Único de Acceso Vocacional</p>
                        <div id="userWelcomeInfo" style="margin-bottom: 15px; font-size: 0.9rem; color: var(--primary);"></div>
                        <div class="input-group-login">
                            <select id="lTipoDoc">
                                <option value="">Tipo de Documento</option>
                                <option value="C.C">Cédula de Ciudadanía (C.C)</option>
                                <option value="TI">Tarjeta de Identidad (TI)</option>
                                <option value="C.E">Cédula de Extranjería (C.E)</option>
                                <option value="EXT">Pasaporte / Extranjería (EXT)</option>
                                <option value="PPT">Permiso Temporal (PPT)</option>
                            </select>
                        </div>
                        <div class="input-group-login">
                            <input type="text" id="lId" placeholder="Número de Identificación">
                        </div>
                        <div id="passwordArea" class="input-group-login" style="display:none;">
                            <input type="password" id="lPass" placeholder="Contraseña">
                        </div>
                        <div class="options-login">
                            <label><input type="checkbox"> Recordarme</label>
                            <a href="#">¿Olvidaste tu ID?</a>
                        </div>
                        <button id="btnAuth" class="btn-login-action" onclick="authStepOne()">CONTINUAR</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div id="appContainer" class="app-container">
        <aside class="sidebar">
            <h2>Bienvenido</h2>
            <nav id="roleMenu" class="nav-menu"></nav>
            <div style="position: absolute; bottom: 40px; width: calc(100% - 50px);">
                <div class="nav-item logout-item" onclick="logout()">
                    <i class="fa-solid fa-power-off"></i> Salir del Sistema
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header-top">
                <div>
                    <h1 id="pageTitle" style="font-weight: 800; font-size: 2rem;"></h1>
                    <p id="pageDesc" style="color: var(--secondary);"></p>
                </div>
                <div style="display:flex; align-items:center; gap:14px;">
                    <div id="headerNotifWrap" class="header-notif-wrap" style="display:none;" title="Resumen de actividad">
                        <i class="fa-solid fa-bell"></i>
                        <span id="headerNotifCount" class="header-notif-count" style="display:none;">0</span>
                    </div>
                    <div class="user-profile">
                        <div style="text-align: right;">
                            <span id="userName" style="font-weight: 700; display: block;"></span>
                            <span id="userTag" style="font-size: 0.75rem; color: var(--secondary);"></span>
                        </div>
                        <div id="userAvatar" class="user-avatar"></div>
                    </div>
                </div>
            </header>
            <div id="dynamicBoard" class="bento-grid"></div>
        </main>
    </div>
    <!-- Librería para leer archivos Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="src/js/supabaseClient.js"></script>
    <script src="src/js/utils.js"></script>
    <script src="src/js/auth.js"></script>
    <script src="src/js/dashboard.js"></script>
    <script src="src/js/test.js"></script>
</body>
</html>
